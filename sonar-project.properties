sonar.projectKey=vacancyhai_hermes
sonar.organization=vacancyhai
sonar.host.url=https://sonarcloud.io

sonar.projectName=Hermes
sonar.projectVersion=1.0

# Source roots
sonar.sources=src/backend/app,src/frontend/app,src/frontend-admin/app

# Python version
sonar.python.version=3.12

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — strip noise from the 22k LOC count
sonar.exclusions=\
  **/venv/**,\
  **/__pycache__/**,\
  **/migrations/**,\
  **/tests/**,\
  **/static/**,\
  .dockerignore,\
  **/node_modules/**,\
  **/*.pyc

# Test sources (reported separately, not counted in main LOC)
sonar.tests=src/backend/tests,src/frontend/tests,src/frontend-admin/tests
sonar.test.inclusions=**/test_*.py,**/*_test.py

# Coverage report (generated by pytest-cov inside Docker)
sonar.python.coverage.reportPaths=coverage.xml

# Duplication — ignore migrations and test boilerplate
sonar.cpd.exclusions=**/migrations/**,**/tests/**
