sonar.projectKey=vacancyhai_hermes
sonar.organization=vacancyhai
sonar.host.url=https://sonarcloud.io

sonar.projectName=Hermes
sonar.projectVersion=1.0

# Source roots
sonar.sources=src/backend/app,src/frontend/app,src/frontend-admin/app

# Test roots (so SonarCloud can map coverage correctly)
sonar.tests=src/backend/tests,src/frontend/tests,src/frontend-admin/tests

# Python version
sonar.python.version=3.12

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report paths (relative to project root — matched by CI artifact layout)
sonar.python.coverage.reportPaths=coverage/backend/coverage.xml,coverage/frontend/coverage.xml,coverage/frontend-admin/coverage.xml

# Exclusions — strip noise from the 22k LOC count
sonar.exclusions=**/venv/**,**/__pycache__/**,**/migrations/**,**/static/**,**/templates/**,.dockerignore,**/node_modules/**,**/*.pyc

# Duplication — ignore migrations and test boilerplate
sonar.cpd.exclusions=**/migrations/**,**/tests/**
