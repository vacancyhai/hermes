services:
  postgresql:
    image: postgres:16-alpine
    container_name: hermes_postgresql
    restart: unless-stopped
    env_file:
      - ./config/development/.env.backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes_network

  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    restart: unless-stopped
    env_file:
      - ./config/development/.env.backend
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --appendonly yes --appendfsync everysec --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server --appendonly yes --appendfsync everysec;
      fi'
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes_network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: hermes_pgbouncer
    restart: unless-stopped
    env_file:
      - ./config/development/.env.backend
    environment:
      DATABASE_URL: ""
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes_network

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: hermes_backend
    restart: unless-stopped
    env_file:
      - ./config/development/.env.backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./src/backend/app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./secrets:/app/secrets:ro
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
    networks:
      - hermes_network

  hermes-worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: hermes_worker
    restart: unless-stopped
    env_file:
      - ./config/development/.env.backend
    volumes:
      - ./src/backend/app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./secrets:/app/secrets:ro
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.celery_app:celery worker
        --loglevel=info
        --concurrency=2
    networks:
      - hermes_network

  hermes-scheduler:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: hermes_scheduler
    restart: unless-stopped
    env_file:
      - ./config/development/.env.backend
    volumes:
      - ./src/backend/app:/app/app
      - ./secrets:/app/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    command: >-
      celery -A app.celery_app:celery beat
        --loglevel=info
    networks:
      - hermes_network

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: hermes_frontend
    restart: unless-stopped
    env_file:
      - ./config/development/.env.frontend
    ports:
      - "${FRONTEND_REACT_PORT:-3000}:3000"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev
    networks:
      - hermes_network

  frontend-admin:
    build:
      context: ./src/frontend-admin
      dockerfile: Dockerfile
      target: dev
    container_name: hermes_frontend_admin
    restart: unless-stopped
    env_file:
      - ./config/development/.env.frontend-admin
    ports:
      - "${FRONTEND_ADMIN_REACT_PORT:-4000}:4000"
    volumes:
      - ./src/frontend-admin:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev
    networks:
      - hermes_network


volumes:
  postgres_data:
  redis_data:

networks:
  hermes_network:
    name: hermes_network
