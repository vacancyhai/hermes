services:
  postgresql:
    image: postgres:16-alpine
    container_name: test_postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes_test_db}
      POSTGRES_USER: ${POSTGRES_USER:-hermes_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes_user} -d ${POSTGRES_DB:-hermes_test_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test_network

  redis:
    image: redis:7-alpine
    container_name: test_redis
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test_network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: test_pgbouncer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hermes_user}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB:-hermes_test_db}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test_network

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: test_backend
    env_file:
      - ./config/test/.env.backend
    volumes:
      - ./src/backend/tests:/app/tests
      - ./src/backend/pytest.ini:/app/pytest.ini
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./secrets:/app/secrets:ro
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
    networks:
      - test_network

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: test_frontend
    env_file:
      - ./config/test/.env.frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - test_network

  frontend-admin:
    build:
      context: ./src/frontend-admin
      dockerfile: Dockerfile
    container_name: test_frontend_admin
    env_file:
      - ./config/test/.env.frontend-admin
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - test_network

networks:
  test_network:
    name: hermes_test_network
