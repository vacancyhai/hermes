repos:
  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements        # catch leftover breakpoint() / pdb calls
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Python formatting (Black) ───────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12
        files: ^src/backend/

  # ── Import sorting (isort, Black-compatible profile) ───────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black]
        files: ^src/backend/

  # ── Linting (Flake8 + plugins) ──────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        files: ^src/backend/
        additional_dependencies:
          - flake8-bugbear       # opinionated bug-catching rules
          - flake8-comprehensions
          - flake8-simplify
        args:
          - --max-line-length=100
          - --extend-ignore=E203,W503   # Black-compatible suppressions

  # ── Static type checking (mypy, non-blocking) ───────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^src/backend/app/
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy>=2.0

  # ── Secret detection ─────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: (\.env\.example|config/.*\.env\..*)
