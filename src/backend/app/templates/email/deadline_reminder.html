{% extends "email/base.html" %}
{% block content %}
<h2>⏰ {{ title }}</h2>
<p>Hi {{ name }},</p>
<p>{{ message }}</p>
<table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
  <tr>
    <td style="padding: 8px 0; color: #64748b;">Job Title</td>
    <td style="padding: 8px 0; font-weight: 600;">{{ job_title }}</td>
  </tr>
  <tr>
    <td style="padding: 8px 0; color: #64748b;">Organization</td>
    <td style="padding: 8px 0;">{{ organization }}</td>
  </tr>
  <tr>
    <td style="padding: 8px 0; color: #64748b;">Deadline</td>
    <td style="padding: 8px 0; font-weight: 600; color: #dc2626;">{{ deadline }}</td>
  </tr>
</table>
<p style="text-align: center; margin: 28px 0;">
  <a href="{{ base_url }}/jobs/{{ slug }}" class="btn">View Job Details</a>
</p>
<p class="muted">This is an automated reminder from your tracked applications on Hermes.</p>
{% endblock %}
