{% extends "base.html" %}
{% block title %}Login — Hermes{% endblock %}

{% block head %}
<style>
    .login-box{max-width:400px;margin:3rem auto;background:#fff;border:1px solid #e2e8f0;border-radius:.5rem;padding:2rem}
    .login-box h1{font-size:1.5rem;margin-bottom:1.5rem;text-align:center}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:.875rem;font-weight:500;margin-bottom:.35rem;color:#334155}
    .form-group input{width:100%;padding:.5rem .75rem;border:1px solid #cbd5e1;border-radius:.375rem;font-size:.9rem}
    .form-group input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
    .flash-error{background:#fee2e2;color:#991b1b;padding:.5rem .75rem;border-radius:.375rem;font-size:.85rem;margin-bottom:1rem}
</style>
{% endblock %}

{% block content %}
<div class="login-box">
    <h1>Sign In</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash-error">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST" action="/login">
        <input type="hidden" name="next" value="{{ next or '/dashboard' }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Sign In</button>
    </form>
</div>
{% endblock %}
