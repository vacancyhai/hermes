<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Vacancy Hai</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,-apple-system,sans-serif;color:#1e293b;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
        .container{max-width:400px}
        h1{font-size:1.5rem;margin-bottom:.75rem;color:#1e3a5f}
        p{color:#64748b;margin-bottom:1.5rem;line-height:1.6}
        .icon{font-size:3rem;margin-bottom:1rem}
        .btn{display:inline-block;padding:.6rem 1.25rem;border-radius:.375rem;font-size:.9rem;cursor:pointer;border:none;font-weight:500;background:#2563eb;color:#fff;text-decoration:none}
        .btn:hover{background:#1d4ed8}
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128268;</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
