<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hermes — Government Job Portal{% endblock %}</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1e3a5f">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    {% block meta %}{% endblock %}
    <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,-apple-system,sans-serif;color:#1e293b;line-height:1.6;background:#f8fafc}
        a{color:#2563eb;text-decoration:none}
        a:hover{text-decoration:underline}
        header{background:#1e3a5f;color:#fff;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
        header a{color:#fff;font-weight:700;font-size:1.25rem}
        header nav a{margin-left:1.5rem;font-weight:400;font-size:.9rem;opacity:.85}
        header nav a:hover{opacity:1;text-decoration:none}
        main{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
        footer{text-align:center;padding:2rem 1rem;color:#64748b;font-size:.85rem;border-top:1px solid #e2e8f0;margin-top:2rem}
        .btn{display:inline-block;padding:.5rem 1rem;border-radius:.375rem;font-size:.875rem;cursor:pointer;border:none;font-weight:500}
        .btn-primary{background:#2563eb;color:#fff}
        .btn-primary:hover{background:#1d4ed8;text-decoration:none}
        .btn-outline{border:1px solid #cbd5e1;background:#fff;color:#334155}
        .btn-outline:hover{border-color:#94a3b8;text-decoration:none}
        .badge{display:inline-block;padding:.15rem .5rem;border-radius:9999px;font-size:.75rem;font-weight:600}
        .badge-featured{background:#fef3c7;color:#92400e}
        .badge-urgent{background:#fee2e2;color:#991b1b}
        .badge-type{background:#e0e7ff;color:#3730a3}
        .htmx-indicator{display:none}
        .htmx-request .htmx-indicator{display:block}
        [x-cloak]{display:none!important}
        .sec-nav a{padding:.5rem 1.1rem;font-size:.85rem;white-space:nowrap;color:#93afc5;border-bottom:2px solid transparent;font-weight:400;text-decoration:none;display:inline-block}
        .sec-nav a:hover{color:#cbd5e1;text-decoration:none}
        .sec-nav a.active{color:#fff;border-bottom-color:#60a5fa;font-weight:600}
        .list-tab{padding:.55rem 1.1rem;font-size:.875rem;font-weight:500;color:#64748b;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s}
        .list-tab:hover{color:#1e293b}
        .list-tab-active{color:#2563eb!important;border-bottom-color:#2563eb!important;font-weight:600}
        .btn-watching{background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:.375rem;cursor:pointer;font-weight:500}
        .btn-watching:hover{background:#fde68a}
        .card-latest{border-left:3px solid #7c3aed!important;background:#faf5ff!important}
        .card-latest .card-type-tag{background:#ede9fe;color:#5b21b6}
        .card-admit{border-left:3px solid #2563eb!important;background:#eff6ff!important}
        .card-admit .card-type-tag{background:#dbeafe;color:#1e40af}
        .card-answer{border-left:3px solid #d97706!important;background:#fffbeb!important}
        .card-answer .card-type-tag{background:#fef3c7;color:#92400e}
        .card-result{border-left:3px solid #16a34a!important;background:#f0fdf4!important}
        .card-result .card-type-tag{background:#dcfce7;color:#166534}
        .card-type-tag{font-size:.7rem;font-weight:600;padding:.15rem .55rem;border-radius:9999px;display:inline-block}
        .meta-pill{font-size:.78rem;padding:.2rem .55rem;border-radius:.25rem;display:inline-block}
        .pill-blue{background:#dbeafe;color:#1e40af}
        .pill-amber{background:#fef3c7;color:#92400e}
        .pill-green{background:#dcfce7;color:#166534}
        .pill-purple{background:#ede9fe;color:#5b21b6}
        .pill-red{background:#fee2e2;color:#991b1b}

        /* ── Detail page shared ──────────────────────────────────────── */
        .back-link{display:inline-flex;align-items:center;gap:.3rem;font-size:.875rem;color:#64748b;margin-bottom:1rem}
        .back-link:hover{color:#2563eb;text-decoration:none}

        /* Type-aware hero banner */
        .detail-hero{padding:1.5rem 1.25rem 1.25rem;border-radius:.75rem;margin-bottom:1.25rem;color:#fff}
        .detail-hero h1{font-size:1.35rem;font-weight:700;line-height:1.3;margin-bottom:.3rem}
        .detail-hero .org{font-size:.9rem;opacity:.85}
        .hero-job{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%)}
        .hero-admit{background:linear-gradient(135deg,#1e40af 0%,#3b82f6 100%)}
        .hero-answer{background:linear-gradient(135deg,#92400e 0%,#d97706 100%)}
        .hero-result{background:linear-gradient(135deg,#14532d 0%,#16a34a 100%)}
        .hero-entrance-exam{background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 100%)}

        /* Key dates grid */
        .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;margin-bottom:1.25rem}
        .detail-item{background:#fff;border:1px solid #e2e8f0;border-radius:.5rem;padding:.65rem .85rem}
        .detail-item .label{font-size:.7rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
        .detail-item .value{font-size:.925rem;font-weight:500;margin-top:.1rem;color:#1e293b}
        .detail-item .value.urgent{color:#dc2626}
        @media(max-width:580px){.detail-grid{grid-template-columns:1fr}}

        /* Section divider */
        .detail-section{margin-bottom:1.5rem}
        .detail-section h2{font-size:1rem;font-weight:700;margin-bottom:.6rem;padding-bottom:.3rem;border-bottom:2px solid #e2e8f0;color:#1e293b;display:flex;align-items:center;gap:.4rem}
        .detail-section p,.detail-section li{font-size:.9rem;color:#334155;line-height:1.6}
        .detail-section ul,.detail-section ol{padding-left:1.2rem}
        .detail-section li{margin-bottom:.2rem}

        /* Fee table */
        .fee-table{width:100%;border-collapse:collapse;font-size:.875rem;margin-top:.5rem;border-radius:.375rem;overflow:hidden;border:1px solid #e2e8f0}
        .fee-table th{background:#f8fafc;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:#64748b;padding:.5rem .75rem;text-align:left;border-bottom:1px solid #e2e8f0}
        .fee-table td{padding:.45rem .75rem;border-bottom:1px solid #f1f5f9;color:#334155}
        .fee-table tr:last-child td{border-bottom:none}

        /* Action / share bar */
        .action-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin:.75rem 0}
        .share-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.4rem .75rem;border-radius:.375rem;font-size:.8rem;font-weight:500;text-decoration:none;border:1px solid #e2e8f0;background:#fff;color:#334155;cursor:pointer;white-space:nowrap}
        .share-btn:hover{background:#f8fafc;text-decoration:none}

        /* Flash messages */
        .flash-success{background:#d1fae5;color:#065f46;padding:.5rem .75rem;border-radius:.375rem;font-size:.85rem;margin-bottom:.75rem;border:1px solid #a7f3d0}
        .flash-info{background:#dbeafe;color:#1e40af;padding:.5rem .75rem;border-radius:.375rem;font-size:.85rem;margin-bottom:.75rem;border:1px solid #bfdbfe}
        .flash-error{background:#fee2e2;color:#991b1b;padding:.5rem .75rem;border-radius:.375rem;font-size:.85rem;margin-bottom:.75rem;border:1px solid #fecaca}

        /* Doc tabs */
        .doc-tabs-bar{display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:0;overflow-x:auto;scrollbar-width:none}
        .doc-tab-btn{padding:.5rem 1.1rem;font-size:.85rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:#64748b;background:none;border-left:none;border-right:none;border-top:none;white-space:nowrap}
        .doc-tab-btn:hover{color:#1e293b}
        .doc-tab-btn.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}

        /* Doc panel cards */
        .doc-panel{padding-top:.85rem}
        .doc-card{border-radius:.5rem;padding:.75rem 1rem;margin-bottom:.65rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
        .doc-card-admit{border:1px solid #bfdbfe;background:#eff6ff}
        .doc-card-answer{border:1px solid #fde68a;background:#fefce8}
        .doc-card-result{border:1px solid #bbf7d0;background:#f0fdf4}
        .doc-card-body{flex:1;min-width:0}
        .doc-card-actions{display:flex;gap:.4rem;flex-wrap:wrap;flex-shrink:0}
        .doc-phase-pill{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.1rem .5rem;border-radius:9999px;display:inline-block;margin-bottom:.25rem;margin-right:.25rem}
        .phase-blue{background:#dbeafe;color:#1e40af}
        .phase-amber{background:#fef3c7;color:#92400e}
        .phase-green{background:#dcfce7;color:#166534}
        .type-final{background:#dcfce7;color:#166534}
        .type-prov{background:#fef9c3;color:#713f12}
        .doc-title{font-weight:600;font-size:.9rem;color:#1e293b;margin-bottom:.2rem}
        .doc-meta{font-size:.8rem;color:#64748b;margin-top:.15rem}
        .doc-note{font-size:.78rem;color:#94a3b8;margin-top:.2rem;font-style:italic}
        .doc-deadline{font-size:.8rem;color:#b45309;margin-top:.15rem;font-weight:500}
        .doc-cutoff{font-size:.78rem;color:#475569;margin-top:.3rem;border-top:1px solid rgba(0,0,0,.06);padding-top:.3rem}
        .doc-cutoff-row{display:flex;justify-content:space-between;padding:.15rem 0}
        .doc-btn{display:inline-flex;align-items:center;gap:.25rem;padding:.4rem .75rem;border-radius:.375rem;font-size:.8rem;font-weight:500;white-space:nowrap;text-decoration:none;border:none;cursor:pointer}
        .doc-btn-blue{background:#2563eb;color:#fff}
        .doc-btn-blue:hover{background:#1d4ed8;text-decoration:none;color:#fff}
        .doc-btn-amber{background:#d97706;color:#fff}
        .doc-btn-amber:hover{background:#b45309;text-decoration:none;color:#fff}
        .doc-btn-green{background:#16a34a;color:#fff}
        .doc-btn-green:hover{background:#15803d;text-decoration:none;color:#fff}
        .doc-btn-outline{background:#fff;border:1px solid #fde68a;color:#92400e}
        .doc-btn-outline:hover{background:#fefce8;text-decoration:none}
        .doc-empty{color:#94a3b8;font-size:.875rem;padding:.75rem 0;text-align:center}
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <a href="/">Hermes</a>
        <nav>
            <a href="/dashboard">Dashboard</a>
            {% if session.get('token') %}
                <a href="/profile">Profile</a>
                <a href="/notifications" style="position:relative;">
                    🔔
                    <span id="notif-badge"
                          hx-get="/notifications/unread-count"
                          hx-trigger="load, every 30s"
                          hx-swap="innerHTML"
                          style="position:absolute;top:-6px;right:-10px;background:#ef4444;color:#fff;border-radius:50%;font-size:.65rem;min-width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;"></span>
                </a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </nav>
    </header>
    <nav class="sec-nav" style="background:#162d4a;border-bottom:1px solid #1e3a5f;overflow-x:auto;white-space:nowrap;display:flex">
        <a href="/jobs" class="{{ 'active' if request.path.startswith('/jobs') else '' }}">Jobs</a>
        <a href="/admit-cards" class="{{ 'active' if request.path.startswith('/admit-cards') else '' }}">Admit Cards</a>
        <a href="/answer-keys" class="{{ 'active' if request.path.startswith('/answer-keys') else '' }}">Answer Keys</a>
        <a href="/results" class="{{ 'active' if request.path.startswith('/results') else '' }}">Results</a>
        <a href="/entrance-exams" class="{{ 'active' if request.path.startswith('/entrance-exams') else '' }}">Entrance Exams</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Hermes — Government Job Vacancy Portal &copy; 2025</p>
    </footer>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
    </script>
</body>
</html>
