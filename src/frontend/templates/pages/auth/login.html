{% extends 'layouts/minimal.html' %}

{% block title %}Login — Hermes{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-card__header">
    <a class="auth-card__brand" href="/">Hermes</a>
    <h1 class="auth-card__title">Sign in to your account</h1>
  </div>

  <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input
        class="form-control"
        type="email"
        id="email"
        name="email"
        value="{{ email | default('') }}"
        autocomplete="email"
        required
        autofocus
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">
        Password
        <a class="form-label__link" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
      </label>
      <input
        class="form-control"
        type="password"
        id="password"
        name="password"
        autocomplete="current-password"
        required
      />
    </div>

    <button type="submit" class="btn btn--primary btn--full">Sign in</button>
  </form>

  <p class="auth-card__footer">
    Don't have an account?
    <a href="{{ url_for('auth.register') }}">Create one</a>
  </p>
</div>
{% endblock %}
