{% extends 'layouts/minimal.html' %}

{% block title %}Register — Hermes{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-card__header">
    <a class="auth-card__brand" href="/">Hermes</a>
    <h1 class="auth-card__title">Create your account</h1>
    <p class="auth-card__subtitle">Get personalised government job alerts</p>
  </div>

  <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label" for="full_name">Full name</label>
      <input
        class="form-control"
        type="text"
        id="full_name"
        name="full_name"
        value="{{ full_name | default('') }}"
        autocomplete="name"
        required
        autofocus
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input
        class="form-control"
        type="email"
        id="email"
        name="email"
        value="{{ email | default('') }}"
        autocomplete="email"
        required
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input
        class="form-control"
        type="password"
        id="password"
        name="password"
        autocomplete="new-password"
        minlength="8"
        required
      />
      <small class="form-hint">Minimum 8 characters</small>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm_password">Confirm password</label>
      <input
        class="form-control"
        type="password"
        id="confirm_password"
        name="confirm_password"
        autocomplete="new-password"
        required
      />
    </div>

    <button type="submit" class="btn btn--primary btn--full">Create account</button>
  </form>

  <p class="auth-card__footer">
    Already have an account?
    <a href="{{ url_for('auth.login') }}">Sign in</a>
  </p>
</div>
{% endblock %}
