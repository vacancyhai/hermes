{% extends 'layouts/minimal.html' %}

{% block title %}Forgot Password — Hermes{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-card__header">
    <a class="auth-card__brand" href="/">Hermes</a>
    <h1 class="auth-card__title">Reset your password</h1>
    <p class="auth-card__subtitle">
      Enter your email and we'll send you a reset link.
    </p>
  </div>

  <form method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input
        class="form-control"
        type="email"
        id="email"
        name="email"
        value="{{ email | default('') }}"
        autocomplete="email"
        required
        autofocus
      />
    </div>

    <button type="submit" class="btn btn--primary btn--full">Send reset link</button>
  </form>

  <p class="auth-card__footer">
    <a href="{{ url_for('auth.login') }}">&larr; Back to sign in</a>
  </p>
</div>
{% endblock %}
