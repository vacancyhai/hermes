{% extends 'layouts/minimal.html' %}

{% block title %}Reset Password — Hermes{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-card__header">
    <a class="auth-card__brand" href="/">Hermes</a>
    <h1 class="auth-card__title">Set new password</h1>
  </div>

  {% if token %}
  <form method="POST" action="{{ url_for('auth.reset_password') }}?token={{ token }}" novalidate>
    <div class="form-group">
      <label class="form-label" for="new_password">New password</label>
      <input
        class="form-control"
        type="password"
        id="new_password"
        name="new_password"
        autocomplete="new-password"
        minlength="8"
        required
        autofocus
      />
      <small class="form-hint">Minimum 8 characters</small>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm_password">Confirm new password</label>
      <input
        class="form-control"
        type="password"
        id="confirm_password"
        name="confirm_password"
        autocomplete="new-password"
        required
      />
    </div>

    <button type="submit" class="btn btn--primary btn--full">Set new password</button>
  </form>
  {% else %}
  <p class="auth-card__subtitle">
    This reset link is invalid or has expired.
    <a href="{{ url_for('auth.forgot_password') }}">Request a new one</a>.
  </p>
  {% endif %}

  <p class="auth-card__footer">
    <a href="{{ url_for('auth.login') }}">&larr; Back to sign in</a>
  </p>
</div>
{% endblock %}
