<nav class="navbar">
  <div class="navbar__inner">
    <a class="navbar__brand" href="{{ url_for('main.index') }}">
      <span class="navbar__logo">Hermes</span>
      <span class="navbar__tagline">Govt Job Portal</span>
    </a>

    <button class="navbar__toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="navbar__menu" id="navMenu">
      <ul class="navbar__links">
        <li><a href="{{ url_for('jobs.list_jobs') }}" class="navbar__link {% if request.endpoint and request.endpoint.startswith('jobs.') %}navbar__link--active{% endif %}">Jobs</a></li>
      </ul>

      <div class="navbar__actions">
        {% if current_user.is_authenticated %}
          <a href="{{ url_for('profile.index') }}" class="navbar__link">{{ current_user.full_name or current_user.email }}</a>
          <form method="POST" action="{{ url_for('auth.logout') }}" style="display:inline">
            <button type="submit" class="btn btn--outline btn--sm">Logout</button>
          </form>
        {% else %}
          <a href="{{ url_for('auth.login') }}" class="btn btn--outline btn--sm">Login</a>
          <a href="{{ url_for('auth.register') }}" class="btn btn--primary btn--sm">Register</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
