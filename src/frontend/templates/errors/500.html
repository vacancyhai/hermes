{% extends 'layouts/base.html' %}

{% block title %}Server Error — Hermes{% endblock %}

{% block content %}
<div class="container error-page">
  <div class="error-page__code">500</div>
  <h1 class="error-page__title">Something went wrong</h1>
  <p class="error-page__message">We're sorry — an unexpected error occurred. Please try again in a moment.</p>
  <div class="error-page__actions">
    <a href="{{ url_for('main.index') }}" class="btn btn--primary">Go Home</a>
  </div>
</div>
{% endblock %}
