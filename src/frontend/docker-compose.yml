services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes_frontend
    restart: unless-stopped
    environment:
      - FLASK_APP=app
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - BACKEND_API_URL=http://hermes_backend:8000/api/v1
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    volumes:
      - ./app:/app/app  # Hot-reload in development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: >
      flask run --host=0.0.0.0 --port=8080 --reload
    networks:
      - frontend_network
      - backend_network

networks:
  frontend_network:
    name: src_frontend_network
  backend_network:
    name: src_backend_network
    external: true
