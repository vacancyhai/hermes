version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes_frontend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      # Backend API URL - CRITICAL: Points to backend service
      - BACKEND_API_URL=${BACKEND_API_URL:-http://localhost:5000/api/v1}
      # Session configuration
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-3600}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-False}
      - SESSION_COOKIE_HTTPONLY=${SESSION_COOKIE_HTTPONLY:-True}
    volumes:
      - ./app:/app/app
      - ./templates:/app/templates
      - ./static:/app/static
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

networks:
  frontend_network:
    driver: bridge
    name: src_frontend_network
