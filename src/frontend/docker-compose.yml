version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./templates:/app/templates
      - ./static:/app/static
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

networks:
  frontend_network:
    driver: bridge
    name: src_frontend_network
