{% extends "shared/base.html" %}

{% block title %}Manage Results — Hermes Admin{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <h1 style="font-size:1.35rem;">Results Management</h1>
    <div style="display:flex;gap:.5rem;">
        <a href="/results/new" class="btn btn-primary">+ New Result</a>
    </div>
</div>

<div class="card" style="padding:0;overflow-x:auto;">
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Phase</th>
                <th>Type</th>
                <th>Linked To</th>
                <th>Total Qualified</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="result-list">
            {% include "results/_result_rows.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
