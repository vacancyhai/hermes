{% extends "base.html" %}

{% block title %}Login — Hermes Admin{% endblock %}

{% block content %}
<div style="max-width:360px;margin:3rem auto;">
    <div class="card">
        <h2 style="margin-bottom:1rem;text-align:center;">Admin Login</h2>
        <form method="POST" action="/login">
            <div style="margin-bottom:.75rem;">
                <label style="display:block;font-size:.85rem;font-weight:500;margin-bottom:.25rem;">Email</label>
                <input type="email" name="email" required style="width:100%;padding:.5rem .75rem;border:1px solid #cbd5e1;border-radius:.375rem;font-size:.9rem;">
            </div>
            <div style="margin-bottom:1rem;">
                <label style="display:block;font-size:.85rem;font-weight:500;margin-bottom:.25rem;">Password</label>
                <input type="password" name="password" required style="width:100%;padding:.5rem .75rem;border:1px solid #cbd5e1;border-radius:.375rem;font-size:.9rem;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:.6rem;">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
