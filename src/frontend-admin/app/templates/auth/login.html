{% extends "shared/base.html" %}

{% block title %}Login — Vacancy Hai Admin{% endblock %}

{% block head %}
<style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
    .login-wrap { max-width: 400px; margin: 5vh auto 0; padding: 1rem; }
    .login-card { background: #fff; border-radius: .75rem; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .login-logo { text-align: center; margin-bottom: 1.75rem; }
    .login-logo .logo-icon { display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; background: linear-gradient(135deg, #1e3a5f, #2563eb); border-radius: .75rem; margin-bottom: .75rem; }
    .login-logo h1 { font-size: 1.35rem; font-weight: 700; color: #0f172a; margin-bottom: .2rem; }
    .login-logo p { font-size: .82rem; color: #64748b; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: .35rem; }
    .form-group input { width: 100%; padding: .6rem .85rem; border: 1.5px solid #e2e8f0; border-radius: .4rem; font-size: .9rem; color: #1e293b; transition: border-color .15s, box-shadow .15s; background: #f8fafc; }
    .form-group input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); background: #fff; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.5rem; }
    .pw-toggle { position: absolute; right: .7rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #94a3b8; padding: 0; line-height: 1; font-size: 1rem; }
    .pw-toggle:hover { color: #475569; }
    .remember-row { display: flex; align-items: center; gap: .5rem; margin-bottom: 1.25rem; }
    .remember-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: #2563eb; cursor: pointer; flex-shrink: 0; }
    .remember-row label { font-size: .82rem; color: #475569; cursor: pointer; font-weight: 500; }
    .btn-signin { width: 100%; padding: .65rem; border-radius: .4rem; background: linear-gradient(135deg, #1e3a5f, #2563eb); color: #fff; font-size: .9rem; font-weight: 600; border: none; cursor: pointer; transition: opacity .15s; }
    .btn-signin:hover { opacity: .9; }
    .login-footer { text-align: center; margin-top: 1.25rem; font-size: .78rem; color: #94a3b8; }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="login-card">

        <div class="login-logo">
            <div class="logo-icon">
                <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1>Vacancy Hai Admin</h1>
            <p>Sign in to manage content and users</p>
        </div>

        <form method="POST" action="/login" autocomplete="on">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="admin@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="pw-wrap">
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                    <button type="button" class="pw-toggle" onclick="togglePw()" title="Show/hide password" aria-label="Toggle password visibility">
                        <span id="pw-eye">👁</span>
                    </button>
                </div>
            </div>

            <div class="remember-row">
                <input type="checkbox" id="remember" name="remember" value="1">
                <label for="remember">Keep me signed in</label>
            </div>

            <button type="submit" class="btn-signin">Sign In →</button>
        </form>

        <div class="login-footer">Vacancy Hai Admin Panel &copy; 2025</div>
    </div>
</div>

<script>
function togglePw() {
    var inp = document.getElementById('password');
    var eye = document.getElementById('pw-eye');
    if (inp.type === 'password') {
        inp.type = 'text';
        eye.textContent = '🙈';
    } else {
        inp.type = 'password';
        eye.textContent = '👁';
    }
}
</script>
{% endblock %}
