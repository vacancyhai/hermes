{% extends "shared/base.html" %}

{% block title %}Manage Jobs — Hermes Admin{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <h1 style="font-size:1.35rem;">Job Management</h1>
    <a href="/jobs/new" class="btn btn-primary">+ New Job</a>
</div>

<div class="card" style="padding:0;overflow-x:auto;">
    <table>
        <thead>
            <tr>
                <th>Job Title</th>
                <th>Organization</th>
                <th>Status</th>
                <th>Vacancies</th>
                <th>Deadline</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="job-list">
            {% include "jobs/_job_rows.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
