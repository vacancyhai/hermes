{% extends "base.html" %}

{% block title %}Jobs — Hermes Admin{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <h1 style="font-size:1.35rem;">Job Management</h1>
    <a href="/jobs/upload" class="btn btn-primary">Upload PDF</a>
</div>

<div class="filters">
    <form method="GET" action="/jobs" style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;">
        <select name="status" onchange="this.form.submit()">
            <option value="">All Statuses</option>
            <option value="active" {% if current_status == 'active' %}selected{% endif %}>Active</option>
            <option value="draft" {% if current_status == 'draft' %}selected{% endif %}>Draft</option>
            <option value="cancelled" {% if current_status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
    </form>
</div>

<div class="card" style="padding:0;overflow-x:auto;">
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Organization</th>
                <th>Status</th>
                <th>Vacancies</th>
                <th>Views</th>
                <th>Apps</th>
                <th>Deadline</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="job-list">
            {% include "_job_rows.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
