{% extends "shared/base.html" %}

{% block title %}Manage Admit Cards — Hermes Admin{% endblock %}

{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <h1 style="font-size:1.35rem;">Admit Cards Management</h1>
    <div style="display:flex;gap:.5rem;">
        <a href="/admit-cards/new" class="btn btn-primary">+ New Admit Card</a>
    </div>
</div>

<div class="card" style="padding:0;overflow-x:auto;">
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Phase</th>
                <th>Linked To</th>
                <th>Valid From</th>
                <th>Valid Until</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="admit-card-list">
            {% include "admit_cards/_admitcard_rows.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
