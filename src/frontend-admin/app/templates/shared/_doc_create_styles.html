<style>
.dc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;gap:1rem}
.dc-back{font-size:.8rem;color:#6b7280;text-decoration:none}
.dc-back:hover{color:#374151}
.dc-title{font-size:1.35rem;font-weight:700;color:#111827;margin:.3rem 0 .2rem}
.dc-sub{font-size:.8rem;color:#6b7280;margin:0}
.dc-id-badge{display:inline-block;background:#f1f5f9;color:#334155;border:1px solid #e2e8f0;border-radius:.3rem;padding:.05rem .4rem;font-family:monospace;font-size:.75rem}
.dc-actions{display:flex;gap:.5rem;align-items:center;flex-shrink:0}
.dc-card{border:1px solid #e5e7eb;border-radius:.75rem;margin-bottom:1.25rem;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.dc-card-header{padding:.6rem 1rem;font-size:.82rem;font-weight:700;color:#fff;letter-spacing:.03em}
.dc-blue{background:linear-gradient(90deg,#1d4ed8,#3b82f6)}
.dc-purple{background:linear-gradient(90deg,#6d28d9,#8b5cf6)}
.dc-green{background:linear-gradient(90deg,#059669,#10b981)}
.dc-slate{background:linear-gradient(90deg,#334155,#64748b)}
.dc-card-body{padding:1rem}
.dc-grid-1{display:grid;grid-template-columns:1fr;gap:.75rem}
.dc-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.dc-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.dc-group{display:flex;flex-direction:column;gap:.25rem}
.dc-group label{font-size:.78rem;font-weight:600;color:#374151}
.dc-group input,.dc-group select,.dc-group textarea{padding:.45rem .65rem;border:1px solid #d1d5db;border-radius:.4rem;font-size:.875rem;font-family:inherit;transition:border-color .15s}
.dc-group input:focus,.dc-group select:focus,.dc-group textarea:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.1)}
.dc-group textarea{resize:vertical}
.dc-prefilled{background:#f0fdf4;border-color:#86efac;color:#166534}
.dc-hint{font-size:.78rem;color:#9ca3af}
.req{color:#ef4444}
.dc-form-actions{display:flex;justify-content:flex-end;gap:.5rem;padding-top:1rem;border-top:1px solid #e5e7eb;margin-top:.5rem}
@media(max-width:640px){.dc-grid-2,.dc-grid-3{grid-template-columns:1fr}.dc-header{flex-direction:column}.dc-actions{width:100%;justify-content:flex-end}}
</style>
