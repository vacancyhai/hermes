{% for log in logs %}
<tr>
    <td style="white-space:nowrap;">{{ log.timestamp[:16].replace('T', ' ') if log.timestamp else '—' }}</td>
    <td><strong>{{ log.action }}</strong></td>
    <td>{{ log.resource_type or '—' }}</td>
    <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ log.details or '—' }}</td>
    <td>{{ log.ip_address or '—' }}</td>
</tr>
{% endfor %}

{% if not logs %}
<tr><td colspan="5" style="text-align:center;color:#64748b;padding:2rem;">No logs found.</td></tr>
{% endif %}

{% if pagination.get('has_more') %}
<tr>
    <td colspan="5" style="text-align:center;padding:1rem;">
        <button class="btn btn-outline"
                hx-get="/logs/list?offset={{ pagination.get('offset', 0) + pagination.get('limit', 20) }}"
                hx-target="#log-list"
                hx-swap="beforeend">
            Load more
        </button>
    </td>
</tr>
{% endif %}
