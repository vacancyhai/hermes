services:
  frontend-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes_frontend_admin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_ADMIN_PORT:-8081}:8081"
    volumes:
      - ./app:/app/app  # Hot-reload in development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: >
      flask run --host=0.0.0.0 --port=8081 --reload
    networks:
      - frontend_admin_network

networks:
  frontend_admin_network:
    name: src_frontend_admin_network
