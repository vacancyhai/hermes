version: '3.8'

services:
  # Admin Frontend Application
  frontend-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes_frontend_admin
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./templates:/app/templates
      - ./static:/app/static
    ports:
      - "${FRONTEND_ADMIN_PORT:-8081}:8081"
    networks:
      - frontend_admin_network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

networks:
  frontend_admin_network:
    driver: bridge
    name: src_frontend_admin_network
