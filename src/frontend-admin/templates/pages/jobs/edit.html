{% extends "layouts/base.html" %}

{% block title %}Edit Job — {{ job.job_title }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-header__title">Edit Job</h1>
  <a href="{{ url_for('jobs.list_jobs') }}" class="btn btn--outline">&larr; Back</a>
</div>

<div class="card">
  <div class="card__body">
    <form method="POST" action="{{ url_for('jobs.edit_job', slug=job.slug) }}" novalidate>
      <input type="hidden" name="job_id" value="{{ job.id }}" />
      {% include 'jobs/_job_form.html' %}
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Save Changes</button>
        <a href="{{ url_for('jobs.list_jobs') }}" class="btn btn--outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
