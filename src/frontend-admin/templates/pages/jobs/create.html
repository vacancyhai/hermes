{% extends "layouts/base.html" %}

{% block title %}Create Job{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-header__title">Create Job</h1>
  <a href="{{ url_for('jobs.list_jobs') }}" class="btn btn--outline">&larr; Back</a>
</div>

<div class="card">
  <div class="card__body">
    <form method="POST" action="{{ url_for('jobs.create_job') }}" novalidate>
      {% include 'jobs/_job_form.html' %}
      <div class="form-actions">
        <button type="submit" class="btn btn--primary">Create Job</button>
        <a href="{{ url_for('jobs.list_jobs') }}" class="btn btn--outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
