{# Shared job form fields — included by both create.html and edit.html #}
{# Variables expected: job_types, qualifications; optionally job{} for edit mode #}
{% set d = job if job is defined else (form_data if form_data is defined else {}) %}

<div class="form-row">
  <div class="form-group form-group--wide">
    <label class="form-label" for="job_title">Job Title <span class="required">*</span></label>
    <input class="form-control" type="text" id="job_title" name="job_title"
           value="{{ d.job_title | default('') }}" required />
  </div>
  <div class="form-group form-group--wide">
    <label class="form-label" for="organization">Organization <span class="required">*</span></label>
    <input class="form-control" type="text" id="organization" name="organization"
           value="{{ d.organization | default('') }}" required />
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label class="form-label" for="job_type">Type <span class="required">*</span></label>
    <select class="form-control" id="job_type" name="job_type" required>
      <option value="">Select type…</option>
      {% for val, label in job_types %}
        <option value="{{ val }}" {% if d.job_type == val %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label class="form-label" for="qualification_level">Qualification</label>
    <select class="form-control" id="qualification_level" name="qualification_level">
      <option value="">Any</option>
      {% for val, label in qualifications %}
        <option value="{{ val }}" {% if d.qualification_level == val %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label class="form-label" for="status">Status</label>
    <select class="form-control" id="status" name="status">
      <option value="draft"    {% if d.status == 'draft' %}selected{% endif %}>Draft</option>
      <option value="active"   {% if d.status == 'active' or not d.status %}selected{% endif %}>Active</option>
      <option value="archived" {% if d.status == 'archived' %}selected{% endif %}>Archived</option>
    </select>
  </div>
</div>

<div class="form-group">
  <label class="form-label" for="description">Description</label>
  <textarea class="form-control" id="description" name="description" rows="5">{{ d.description | default('') }}</textarea>
</div>

<div class="form-group">
  <label class="form-label" for="eligibility">Eligibility</label>
  <textarea class="form-control" id="eligibility" name="eligibility" rows="3">{{ d.eligibility | default('') }}</textarea>
</div>

<div class="form-row">
  <div class="form-group">
    <label class="form-label" for="total_vacancies">Total Vacancies</label>
    <input class="form-control" type="number" id="total_vacancies" name="total_vacancies" min="0"
           value="{{ d.total_vacancies | default('') }}" />
  </div>
  <div class="form-group">
    <label class="form-label" for="salary_min">Salary Min (₹)</label>
    <input class="form-control" type="number" id="salary_min" name="salary_min" min="0"
           value="{{ d.salary_min | default('') }}" />
  </div>
  <div class="form-group">
    <label class="form-label" for="salary_max">Salary Max (₹)</label>
    <input class="form-control" type="number" id="salary_max" name="salary_max" min="0"
           value="{{ d.salary_max | default('') }}" />
  </div>
</div>

<div class="form-row">
  <div class="form-group">
    <label class="form-label" for="application_start">Application Start</label>
    <input class="form-control" type="date" id="application_start" name="application_start"
           value="{{ d.application_start | default('') }}" />
  </div>
  <div class="form-group">
    <label class="form-label" for="application_end">Application End</label>
    <input class="form-control" type="date" id="application_end" name="application_end"
           value="{{ d.application_end | default('') }}" />
  </div>
  <div class="form-group">
    <label class="form-label" for="exam_date">Exam Date</label>
    <input class="form-control" type="date" id="exam_date" name="exam_date"
           value="{{ d.exam_date | default('') }}" />
  </div>
</div>

<div class="form-row">
  <div class="form-group form-group--wide">
    <label class="form-label" for="official_url">Official URL</label>
    <input class="form-control" type="url" id="official_url" name="official_url"
           value="{{ d.official_url | default('') }}" />
  </div>
  <div class="form-group form-group--wide">
    <label class="form-label" for="apply_url">Apply URL</label>
    <input class="form-control" type="url" id="apply_url" name="apply_url"
           value="{{ d.apply_url | default('') }}" />
  </div>
</div>
