# Hermes Nginx Configuration — Development
# In production, SSL is handled by OCI Load Balancer before Nginx.

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:8080;
}

upstream frontend_admin {
    server frontend-admin:8081;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Use incoming X-Request-ID if present, otherwise use nginx's generated $request_id
map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

server {
    listen 80;
    server_name localhost;

    # Security headers (repeated in child location blocks — Nginx does not inherit
    # add_header from parent when a more-specific location also sets headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.googleusercontent.com; font-src 'self'; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; frame-src https://accounts.google.com; frame-ancestors 'self'" always;
    # HSTS is NOT set here — TLS is terminated at the OCI Load Balancer in production.

    # Health check for Nginx itself
    location /health {
        access_log off;
        return 200 '{"status": "ok", "service": "nginx"}';
        add_header Content-Type application/json;
    }

    # Backend API — /api/*
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $req_id;
    }

    # Auth endpoints — stricter rate limit; security headers repeated (no inheritance)
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $req_id;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.googleusercontent.com; font-src 'self'; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; frame-src https://accounts.google.com; frame-ancestors 'self'" always;
    }

    # Sitemap (served as static file by Nginx)
    location = /sitemap.xml {
        root /var/www/static;
        access_log off;
    }

    # Default — User Frontend
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $req_id;
    }
}

# Admin Frontend — separate server block (subdomain in production)
server {
    listen 80;
    server_name admin.localhost;

    # Security headers — HSTS omitted (TLS terminated at OCI Load Balancer in production)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.googleusercontent.com; font-src 'self'; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; frame-src https://accounts.google.com; frame-ancestors 'self'" always;

    location /health {
        access_log off;
        return 200 '{"status": "ok", "service": "nginx-admin"}';
        add_header Content-Type application/json;
    }

    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://frontend_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $req_id;
    }
}
