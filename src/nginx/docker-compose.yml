services:
  nginx:
    image: nginx:alpine
    container_name: hermes_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/var/www/static:ro  # For sitemap.xml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend_network
      - frontend_network
      - frontend_admin_network

networks:
  backend_network:
    name: src_backend_network
    external: true
  frontend_network:
    name: src_frontend_network
    external: true
  frontend_admin_network:
    name: src_frontend_admin_network
    external: true
