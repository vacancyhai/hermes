# Prometheus Configuration for Hermes Platform
# Monitoring: Backend API, Frontend, PostgreSQL, Redis, Nginx, System Metrics

global:
  scrape_interval: 15s        # Scrape metrics every 15 seconds
  evaluation_interval: 15s    # Evaluate alerts every 15 seconds
  external_labels:
    monitor: 'hermes-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/rules/alert_rules.yml'
  - '/etc/prometheus/rules/recording_rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (System metrics: CPU, Memory, Disk, Network)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'system'

  # Docker containers metrics (via cAdvisor)
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']

  # Backend API (Flask with prometheus_client middleware)
  - job_name: 'backend'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend-api'

  # PostgreSQL (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgresql'

  # Redis (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # Nginx (via nginx-prometheus-exporter)
  - job_name: 'nginx'
    scrape_interval: 10s
    static_configs:
      - targets: ['nginx_exporter:9113']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'nginx-proxy'

  # Frontend (health check endpoint)
  - job_name: 'frontend'
    scrape_interval: 30s
    scrape_timeout: 5s
    metrics_path: '/health'
    static_configs:
      - targets: ['frontend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'frontend-app'

  # Celery (via statsd exporter if available, otherwise use task logs)
  - job_name: 'celery'
    static_configs:
      - targets: ['statsd_exporter:9125']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'celery-tasks'
