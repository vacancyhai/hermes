# Grafana Data Source Configuration
# Auto-provisioned from docker-compose mount
# Path: /etc/grafana/provisioning/datasources/prometheus.yml

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
    secureJsonData:
      # Add custom headers if needed
      {}

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: trace_id
          matcherRegex: trace_id=(\w+)
          url: http://jaeger:16686/search?traceID=$${__value.raw}
        - name: request_id
          matcherRegex: request_id=(\w+)
          datasourceUid: Prometheus
          url: /d/hermes_api_calls?var-request_id=$${__value.raw}

  - name: AlertManager
    type: alertlist
    access: proxy
    url: http://alertmanager:9093
    isDefault: false
    editable: true

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:6831
    isDefault: false
    editable: true
