# Prometheus Alert Rules for Hermes Platform
# Monitors: API latency, error rates, resource usage, database health, cache health

groups:
  - name: hermes_alerts
    interval: 15s
    rules:
      # ============== API & Application Alerts ==============

      - alert: HighErrorRate
        expr: |
          (sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)) /
          (sum(rate(http_requests_total[5m])) by (job)) > 0.01
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "High error rate detected on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 1%) for the last 5 minutes"
          action: "Check backend logs: docker-compose logs backend"

      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High API response time on {{ $labels.job }}"
          description: "p95 response time is {{ $value | humanizeDuration }} (threshold: 500ms)"
          action: "Check slow queries and backend performance"

      - alert: APIDowntime
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend API is down!"
          description: "Backend API hasn't responded for 2 minutes"
          action: "Restart backend: docker-compose restart backend"

      # ============== Database Alerts ==============

      - alert: PostgreSQLNotHealthy
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL is unavailable"
          description: "PostgreSQL exporter hasn't responded for 2 minutes"
          action: "Check PostgreSQL logs: docker-compose logs postgresql"

      - alert: PostgreSQLSlowQueries
        expr: |
          pg_slow_queries_total > 50
        for: 10m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High number of slow PostgreSQL queries"
          description: "{{ $value }} slow queries detected in the last 10 minutes"
          action: "Review slow query logs and optimize database indexes"

      - alert: PostgreSQLHighConnections
        expr: |
          pg_stat_activity_count > 90
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL connection pool near capacity"
          description: "{{ $value }} connections out of 100 max ({{ $value | humanizePercentage }} used)"
          action: "Investigate active connections: SELECT * FROM pg_stat_activity;"

      - alert: PostgreSQLDiskAlmostFull
        expr: |
          (pg_stat_user_tables_live_rows_estimate_sum / 1000000) > 80
        for: 10m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL storage approaching limit"
          description: "Database occupancy is {{ $value }}% of estimated capacity"
          action: "Plan database scaling or cleanup old data"

      # ============== Redis/Cache Alerts ==============

      - alert: RedisNotHealthy
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis cache is unavailable"
          description: "Redis hasn't responded for 2 minutes - this affects session storage and task queue"
          action: "Restart Redis: docker-compose restart redis"

      - alert: RedisHighMemoryUsage
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory"
          action: "Increase Redis memory limit or clear old cache entries"

      - alert: RedisEvictions
        expr: |
          increase(redis_evicted_keys_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Redis is evicting keys due to memory pressure"
          description: "{{ $value }} keys evicted in the last 5 minutes"
          action: "Increase Redis memory or reduce cache TTLs"

      - alert: RedislashingQueue
        expr: |
          redis_connected_clients > 50
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "High number of Redis client connections"
          description: "{{ $value }} clients connected (normal: 5-10)"
          action: "Check for connection leaks or Celery worker saturation"

      # ============== Nginx/Proxy Alerts ==============

      - alert: NginxNotHealthy
        expr: up{job="nginx"} == 0
        for: 2m
        labels:
          severity: critical
          service: proxy
        annotations:
          summary: "Nginx reverse proxy is down"
          description: "Nginx hasn't responded for 2 minutes"
          action: "Restart Nginx: docker-compose restart nginx"

      - alert: NginxHighErrorRate
        expr: |
          (nginx_http_requests_total{status=~"5.."} / nginx_http_requests_total) > 0.01
        for: 5m
        labels:
          severity: warning
          service: proxy
        annotations:
          summary: "Nginx returning high error rate"
          description: "Error rate: {{ $value | humanizePercentage }}"
          action: "Check backend health and Nginx error logs"

      - alert: NginxHighLatency
        expr: |
          nginx_upstream_response_time_avg > 1.0
        for: 5m
        labels:
          severity: warning
          service: proxy
        annotations:
          summary: "High latency through Nginx proxy"
          description: "Average response time: {{ $value | humanizeDuration }}"
          action: "Optimize backend performance"

      # ============== System Resource Alerts ==============

      - alert: HighCPUUsage
        expr: |
          (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)) > 0.85
        for: 10m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanizePercentage }} (threshold: 85%)"
          action: "Investigate running processes: top"

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanizePercentage }} (threshold: 90%)"
          action: "Restart services or increase server RAM"

      - alert: DiskSpaceRunningOut
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes)) > 0.85
        for: 10m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} is {{ $value | humanizePercentage }} full (threshold: 85%)"
          action: "Clean up old logs/data or expand disk"

      - alert: DiskIOWaitHigh
        expr: |
          avg(rate(node_cpu_seconds_total{mode="iowait"}[5m])) by (instance) > 0.3
        for: 10m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High disk I/O wait on {{ $labels.instance }}"
          description: "IO wait time is {{ $value | humanizePercentage }}"
          action: "Check disk performance and database query patterns"

      - alert: SystemLoadHigh
        expr: |
          node_load5 > (on(instance) count(node_cpu_seconds_total{mode="system"}) by (instance))
        for: 10m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High system load on {{ $labels.instance }}"
          description: "5-minute load average is higher than CPU count"
          action: "Investigate and optimize running processes"

      # ============== Container Alerts ==============

      - alert: ContainerCrashed
        expr: |
          (container_last_seen - time()) > 0 and (container_last_seen - time()) < 300
        for: 1m
        labels:
          severity: critical
          service: container
        annotations:
          summary: "Container recently crashed: {{ $labels.name }}"
          description: "Container was last seen {{ $value | humanizeDuration }} ago"
          action: "Check container logs: docker logs {{ $labels.name }}"

      - alert: ContainerMemoryLimitApproaching
        expr: |
          (container_memory_usage_bytes / container_memory_limit_bytes) > 0.90
        for: 5m
        labels:
          severity: warning
          service: container
        annotations:
          summary: "Container {{ $labels.name }} approaching memory limit"
          description: "Memory usage is {{ $value | humanizePercentage }} of limit"
          action: "Increase container memory limit"

      # ============== Celery Task Alerts ==============

      - alert: CeleryWorkerDown
        expr: up{job="celery"} == 0
        for: 5m
        labels:
          severity: critical
          service: celery
        annotations:
          summary: "Celery worker is not responding"
          description: "Celery metrics unavailable for 5 minutes"
          action: "Restart Celery worker: docker-compose restart celery_worker"

      - alert: CeleryTasksQueued
        expr: |
          celery_queue_length > 1000
        for: 10m
        labels:
          severity: warning
          service: celery
        annotations:
          summary: "Large Celery task queue backlog"
          description: "{{ $value }} tasks waiting to be processed"
          action: "Scale up Celery workers or optimize task processing"

      # ============== Notification/Integration Alerts ==============

      - alert: NotificationServiceDown
        expr: |
          increase(notifications_failed_total[5m]) > 50
        for: 5m
        labels:
          severity: critical
          service: notifications
        annotations:
          summary: "High notification delivery failure rate"
          description: "{{ $value }} notifications failed in last 5 minutes"
          action: "Check email/FCM service status and credentials"
