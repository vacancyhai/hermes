name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ── 1. Run unit tests inside the backend Docker container ──────────────────
  test:
    name: Unit Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Write the minimum env the backend container needs to start.
      # Template: src/backend/.env.example — copy that and fill in real values locally.
      # Secrets are injected from GitHub Actions secrets; non-sensitive
      # defaults are hard-coded for CI (they never reach production).
      - name: Write CI .env for backend
        run: |
          cat > src/backend/.env <<'EOF'
          APP_ENV=test
          SECRET_KEY=ci-secret-key
          DATABASE_URL=postgresql+asyncpg://hermes_user:hermes_ci_pass@pgbouncer:5432/hermes_db
          POSTGRES_DB=hermes_db
          POSTGRES_USER=hermes_user
          POSTGRES_PASSWORD=hermes_ci_pass
          REDIS_URL=redis://redis:6379/0
          REDIS_PASSWORD=
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          JWT_SECRET_KEY=ci-jwt-secret
          JWT_ACCESS_TOKEN_EXPIRES=900
          JWT_REFRESH_TOKEN_EXPIRES=604800
          MAIL_ENABLED=false
          MAIL_SERVER=localhost
          MAIL_PORT=1025
          MAIL_USE_TLS=false
          MAIL_USERNAME=
          MAIL_PASSWORD=
          MAIL_DEFAULT_SENDER=noreply@ci.local
          FIREBASE_CREDENTIALS_PATH=
          FIREBASE_WEB_API_KEY=
          FIREBASE_AUTH_DOMAIN=
          FIREBASE_PROJECT_ID=
          ANTHROPIC_API_KEY=
          CORS_ORIGINS=["http://localhost:8080"]
          FRONTEND_URL=http://localhost:8080
          SITE_URL=http://localhost
          SITEMAP_PATH=/tmp/sitemap.xml
          TELEGRAM_BOT_TOKEN=
          PDF_UPLOAD_DIR=/tmp/uploads/pdfs
          PDF_MAX_SIZE_MB=10
          REDIS_KEY_PREFIX=hermes
          EOF

      - name: Start Docker Compose services
        working-directory: src/backend
        run: docker compose up -d --build --wait
        env:
          POSTGRES_PASSWORD: hermes_ci_pass

      - name: Run unit tests with coverage
        working-directory: src/backend
        run: |
          docker exec hermes_backend python -m pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:/app/coverage.xml \
            --cov-report=term-missing \
            -q

      - name: Copy coverage report out of container
        run: docker cp hermes_backend:/app/coverage.xml coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

      - name: Tear down services
        if: always()
        working-directory: src/backend
        run: docker compose down -v

  # ── 2. SonarCloud analysis — runs after tests so it gets the coverage XML ──
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          args: >
            -Dsonar.qualitygate.wait=false
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
