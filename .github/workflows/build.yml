name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ── 1. Run unit tests inside the backend Docker container ──────────────────
  test:
    name: Backend Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Write the minimum env the backend container needs to start.
      # Template: src/backend/.env.example — copy that and fill in real values locally.
      # Secrets are injected from GitHub Actions secrets; non-sensitive
      # defaults are hard-coded for CI (they never reach production).
      - name: Write CI .env for backend
        run: |
          cat > src/backend/.env <<'EOF'
          APP_ENV=test
          SECRET_KEY=ci-secret-key
          DATABASE_URL=postgresql+asyncpg://hermes_user:hermes_ci_pass@pgbouncer:5432/hermes_db
          POSTGRES_DB=hermes_db
          POSTGRES_USER=hermes_user
          POSTGRES_PASSWORD=hermes_ci_pass
          REDIS_URL=redis://redis:6379/0
          REDIS_PASSWORD=
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          JWT_SECRET_KEY=ci-jwt-secret
          JWT_ACCESS_TOKEN_EXPIRES=900
          JWT_REFRESH_TOKEN_EXPIRES=604800
          MAIL_ENABLED=false
          MAIL_SERVER=localhost
          MAIL_PORT=1025
          MAIL_USE_TLS=false
          MAIL_USERNAME=
          MAIL_PASSWORD=
          MAIL_DEFAULT_SENDER=noreply@ci.local
          FIREBASE_CREDENTIALS_PATH=
          FIREBASE_WEB_API_KEY=
          FIREBASE_AUTH_DOMAIN=
          FIREBASE_PROJECT_ID=
          ANTHROPIC_API_KEY=
          CORS_ORIGINS=["http://localhost:8080"]
          FRONTEND_URL=http://localhost:8080
          SITE_URL=http://localhost
          SITEMAP_PATH=/tmp/sitemap.xml
          TELEGRAM_BOT_TOKEN=
          PDF_UPLOAD_DIR=/tmp/uploads/pdfs
          PDF_MAX_SIZE_MB=10
          REDIS_KEY_PREFIX=hermes
          EOF

      - name: Start Docker Compose services
        working-directory: src/backend
        run: docker compose up -d --build --wait
        env:
          POSTGRES_PASSWORD: hermes_ci_pass

      - name: Run database migrations
        working-directory: src/backend
        run: docker exec hermes_backend alembic -c /app/alembic.ini upgrade head

      - name: Run unit tests with coverage
        working-directory: src/backend
        run: |
          docker exec hermes_backend python -m pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:/app/coverage.xml \
            --cov-report=term-missing \
            -q

      - name: Copy coverage report out of container
        run: docker cp hermes_backend:/app/coverage.xml coverage.xml

      - name: Fix coverage XML source paths
        run: sed -i 's|/app/app|src/backend/app|g' coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

      - name: Tear down services
        if: always()
        working-directory: src/backend
        run: docker compose down -v

  # ── 2. User frontend tests (Flask + MagicMock — no live services needed) ───
  test-frontend:
    name: User Frontend Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write CI .env for user frontend
        run: |
          cat > src/frontend/.env <<'EOF'
          FLASK_APP=app:app
          FLASK_ENV=test
          FLASK_DEBUG=0
          FRONTEND_PORT=8080
          SECRET_KEY=ci-frontend-secret  # pragma: allowlist secret
          SESSION_TIMEOUT=3600
          BACKEND_API_URL=http://backend:8000/api/v1
          FIREBASE_WEB_API_KEY=
          FIREBASE_AUTH_DOMAIN=
          FIREBASE_PROJECT_ID=
          EOF

      - name: Build user frontend image
        working-directory: src/frontend
        run: docker build -t hermes_frontend_ci .

      - name: Run frontend tests with coverage
        run: |
          mkdir -p src/frontend/coverage
          chmod 777 src/frontend/coverage
          docker run --rm \
            --env-file src/frontend/.env \
            -v ${{ github.workspace }}/src/frontend/coverage:/app/coverage \
            hermes_frontend_ci \
            python -m pytest tests/ \
              --cov=app \
              --cov-report=xml:/app/coverage/coverage.xml \
              --cov-report=term-missing \
              -q

      - name: Fix frontend coverage XML source paths
        run: sed -i 's|/app/app|src/frontend/app|g' src/frontend/coverage/coverage.xml

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-frontend
          path: src/frontend/coverage/coverage.xml
          retention-days: 1

  # ── 3. Admin frontend tests (Flask + MagicMock — no live services needed) ──
  test-frontend-admin:
    name: Admin Frontend Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write CI .env for admin frontend
        run: |
          cat > src/frontend-admin/.env <<'EOF'
          FLASK_APP=app:app
          FLASK_ENV=test
          FLASK_DEBUG=0
          FRONTEND_ADMIN_PORT=8081
          SECRET_KEY=ci-admin-frontend-secret  # pragma: allowlist secret
          SESSION_TIMEOUT=3600
          BACKEND_API_URL=http://backend:8000/api/v1
          EOF

      - name: Build admin frontend image
        working-directory: src/frontend-admin
        run: docker build -t hermes_frontend_admin_ci .

      - name: Run admin frontend tests with coverage
        run: |
          mkdir -p src/frontend-admin/coverage
          chmod 777 src/frontend-admin/coverage
          docker run --rm \
            --env-file src/frontend-admin/.env \
            -v ${{ github.workspace }}/src/frontend-admin/coverage:/app/coverage \
            hermes_frontend_admin_ci \
            python -m pytest tests/ \
              --cov=app \
              --cov-report=xml:/app/coverage/coverage.xml \
              --cov-report=term-missing \
              -q

      - name: Fix admin frontend coverage XML source paths
        run: sed -i 's|/app/app|src/frontend-admin/app|g' src/frontend-admin/coverage/coverage.xml

      - name: Upload admin frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-frontend-admin
          path: src/frontend-admin/coverage/coverage.xml
          retention-days: 1

  # ── 4. SonarCloud — waits for all 3 test jobs, merges all coverage reports ─
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [test, test-frontend, test-frontend-admin]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/backend

      - name: Download frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-frontend
          path: coverage/frontend

      - name: Download admin frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-frontend-admin
          path: coverage/frontend-admin

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          projectBaseDir: ${{ github.workspace }}
          args: >
            -Dsonar.verbose=true
            -Dsonar.branch.name=${{ github.head_ref || github.ref_name }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
