name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ── 1. Run unit tests inside the backend Docker container ──────────────────
  test:
    name: Backend Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start backend services
        run: docker compose -f docker-compose.test.yml up -d --build --wait postgresql redis pgbouncer backend
        env:
          POSTGRES_PASSWORD: hermes_ci_pass

      - name: Run database migrations
        run: docker exec test_backend alembic -c /app/alembic.ini upgrade head

      - name: Run backend tests with coverage
        run: |
          docker exec test_backend python -m pytest \
            tests/unit/ \
            tests/integration/ \
            --cov=app \
            --cov-report=xml:/app/coverage.xml \
            --cov-report=term-missing \
            -q

      - name: Copy coverage report out of container
        run: docker cp test_backend:/app/coverage.xml coverage.xml

      - name: Fix coverage XML source paths
        run: sed -i 's|/app/app|src/backend/app|g' coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

      - name: Tear down backend services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ── 2. User frontend tests (Flask + MagicMock — no live services needed) ───
  test-frontend:
    name: User Frontend Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build user frontend image
        working-directory: src/frontend
        run: docker build -t hermes_frontend_ci .

      - name: Run frontend tests with coverage
        run: |
          mkdir -p src/frontend/coverage
          chmod 777 src/frontend/coverage
          docker run --rm \
            --env-file src/frontend/.env.test \
            -v ${{ github.workspace }}/src/frontend/coverage:/app/coverage \
            hermes_frontend_ci \
            python -m pytest tests/ \
              --cov=app \
              --cov-report=xml:/app/coverage/coverage.xml \
              --cov-report=term-missing \
              -q

      - name: Fix frontend coverage XML source paths
        run: sed -i 's|/app/app|src/frontend/app|g' src/frontend/coverage/coverage.xml

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-frontend
          path: src/frontend/coverage/coverage.xml
          retention-days: 1

  # ── 3. Admin frontend tests (Flask + MagicMock — no live services needed) ──
  test-frontend-admin:
    name: Admin Frontend Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build admin frontend image
        working-directory: src/frontend-admin
        run: docker build -t hermes_frontend_admin_ci .

      - name: Run admin frontend tests with coverage
        run: |
          mkdir -p src/frontend-admin/coverage
          chmod 777 src/frontend-admin/coverage
          docker run --rm \
            --env-file src/frontend-admin/.env.test \
            -v ${{ github.workspace }}/src/frontend-admin/coverage:/app/coverage \
            hermes_frontend_admin_ci \
            python -m pytest tests/ \
              --cov=app \
              --cov-report=xml:/app/coverage/coverage.xml \
              --cov-report=term-missing \
              -q

      - name: Fix admin frontend coverage XML source paths
        run: sed -i 's|/app/app|src/frontend-admin/app|g' src/frontend-admin/coverage/coverage.xml

      - name: Upload admin frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-frontend-admin
          path: src/frontend-admin/coverage/coverage.xml
          retention-days: 1

  # ── 4. E2E — all 3 services up together, cross-service flows ─────────────
  test-e2e:
    name: E2E Tests (cross-service)
    runs-on: ubuntu-latest
    needs: [test, test-frontend, test-frontend-admin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start all services
        run: docker compose -f docker-compose.test.yml up -d --build --wait
        env:
          POSTGRES_PASSWORD: hermes_ci_pass

      - name: Run database migrations
        run: docker exec test_backend alembic -c /app/alembic.ini upgrade head

      - name: Seed CI admin user and regular user; emit user token
        run: |
          E2E_USER_TOKEN=$(docker exec test_backend python -c "
          import asyncio, os, uuid
          from passlib.context import CryptContext
          from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession, async_sessionmaker
          from app.models.admin_user import AdminUser
          from app.models.user import User
          from app.routers.auth import create_access_token
          pwd = CryptContext(schemes=['bcrypt'], deprecated='auto')
          async def seed():
              engine = create_async_engine(os.environ['DATABASE_URL'])
              async_session = async_sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
              async with async_session() as s:
                  s.add(AdminUser(email='admin@ci-test.com', password_hash=pwd.hash('AdminCI123'), full_name='CI Admin', role='admin', department='CI', status='active'))  # pragma: allowlist secret
                  user = User(email='user@ci-test.com', full_name='CI User', status='active', is_verified=True, is_email_verified=True)
                  s.add(user)
                  await s.flush()
                  token = create_access_token(str(user.id), 'user')
                  await s.commit()
              await engine.dispose()
              print(token, end='')
          asyncio.run(seed())
          ")
          echo "E2E_USER_TOKEN=$E2E_USER_TOKEN" >> $GITHUB_ENV

      - name: Set up Python for e2e runner
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install e2e test dependencies
        run: pip install -r tests/e2e/requirements.txt

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ \
            --tb=short \
            -q
        env:
          FRONTEND_URL: http://localhost:8080
          ADMIN_URL: http://localhost:8081
          BACKEND_URL: http://localhost:8000
          E2E_ADMIN_EMAIL: admin@ci-test.com
          E2E_ADMIN_PASSWORD: AdminCI123  # pragma: allowlist secret

      - name: Tear down e2e services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ── 5. SonarCloud — waits for all 3 test jobs, merges all coverage reports ─
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [test, test-frontend, test-frontend-admin, test-e2e]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/backend

      - name: Download frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-frontend
          path: coverage/frontend

      - name: Download admin frontend coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-frontend-admin
          path: coverage/frontend-admin

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          projectBaseDir: ${{ github.workspace }}
          args: >
            -Dsonar.verbose=true
            -Dsonar.branch.name=${{ github.head_ref || github.ref_name }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
